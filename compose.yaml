services:

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: account-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/h2-console"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  subscription-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: subscription-service
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/h2-console"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: transaction-service
    ports:
      - "8082:8082"
    environment:
      - SERVICES_ACCOUNT_URL=http://account-service:8081
      - SERVICES_SUBSCRIPTION_URL=http://subscription-service:8085
    depends_on:
      account-service:
        condition: service_healthy
      subscription-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/h2-console"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  favorite-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: favorite-service
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/h2-console"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  playlist-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: playlist-service
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/h2-console"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVICES_ACCOUNT_URL=http://account-service:8081
      - SERVICES_TRANSACTION_URL=http://transaction-service:8082
      - SERVICES_FAVORITE_URL=http://favorite-service:8083
      - SERVICES_PLAYLIST_URL=http://playlist-service:8084
      - SERVICES_SUBSCRIPTION_URL=http://subscription-service:8085
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      favorite-service:
        condition: service_healthy
      playlist-service:
        condition: service_healthy
      subscription-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
